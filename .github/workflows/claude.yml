name: Claude Agent Team

# Triggers:
#  - an issue is opened OR labeled with the `agent` label   -> runs automatically, no @claude needed
#  - a comment on an issue/PR contains "@claude"            -> still supported for ad-hoc runs
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude:
    # Run when the issue carries the `agent` label (auto), or when @claude is
    # mentioned in a comment (manual). The label path removes the need to type
    # @claude on every issue: create 8 issues labeled `agent` and all 8 fire.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'agent'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude agent team
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Temporary: surface the real SDK error in the Actions log while we
          # get the end-to-end flow working. Remove once it's stable.
          show_full_output: true
          # The team is defined in .claude/agents/ and standards in CLAUDE.md.
          # Claude acts as the Leader and delegates to tech-lead, developer,
          # qa-reviewer and bug-fixer automatically.
          # allowedTools grants what the default action set omits: editing/
          # writing files (Edit/Write), running npm (Bash), and spawning the
          # agent team (Task). Read/git/comment tools stay enabled too.
          claude_args: >-
            --max-turns 150
            --allowedTools "Read,Glob,Grep,LS,Edit,Write,Bash,Task,mcp__github_comment__update_claude_comment"
            --append-system-prompt "For any implementation request, you MUST run the multi-agent team via the Task tool, never implement directly: 1) tech-lead plans the work, 2) developer implements, 3) qa-reviewer reviews against CLAUDE.md and runs npm test, 4) if QA requests changes, bug-fixer fixes them and qa-reviewer re-reviews, looping until APPROVED. Only then commit, push, and open the PR."
