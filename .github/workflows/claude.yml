name: Claude Agent Team

# Triggers: comment "@claude ..." on an issue or PR, or open an issue containing "@claude".
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude:
    # Only run when @claude is mentioned
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude agent team
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The team is defined in .claude/agents/ and standards in CLAUDE.md.
          # Claude acts as the Leader and delegates to tech-lead, developer,
          # qa-reviewer and bug-fixer automatically.
          claude_args: "--max-turns 25 --model claude-sonnet-4-6"
